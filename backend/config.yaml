# BrainSightAI's Chatbot Configuration
# Multi-Model LLM Support

app:
  name: "BrainSightAI Chatbot"
  version: "2.0.0"
  environment: "production"  # development, staging, production
  debug: false

# LLM Provider Configuration
llm:
  # Default provider to use (openai, claude, gemini, huggingface)
  default_provider: "openai"
  
  # Enable automatic fallback to next provider if primary fails
  enable_fallback: true
  
  # Fallback order
  fallback_order:
   - "openai"
   - "gemini"
   - "huggingface"
   - "claude"
  
  # Provider-specific configurations
  providers:
    openai:
      enabled: true
      model: "gpt-4-turbo-preview"
      api_key_env: "OPENAI_API_KEY"
      temperature: 0.4
      max_tokens: 300
      top_p: 0.9
      frequency_penalty: 0.0
      presence_penalty: 0.0
      stream: true
      timeout: 30
      
    claude:
      enabled: true
      model: "claude-3-5-sonnet-20241022"
      api_key_env: "ANTHROPIC_API_KEY"
      temperature: 0.4
      max_tokens: 300
      top_p: 0.9
      stream: true
      timeout: 30
      
    gemini:
      enabled: true
      model: "gemini-2.5-flash"
      api_key_env: "GOOGLE_API_KEY"
      temperature: 0.4
      max_tokens: 300
      top_p: 0.9
      stream: true
      timeout: 30
      
    huggingface:
      enabled: true
      model: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
      api_key_env: "HF_TOKEN"
      temperature: 0.7
      max_tokens: 1000
      top_p: 0.9
      stream: false
      timeout: 30

# Conversation Memory Configuration
conversation_memory:
  # Type of memory to use
  type: "buffer_window"  # buffer_window, summary, entity
  
  # Buffer window settings
  buffer_window:
    # Number of Q&A exchanges to keep (k parameter)
    # k=5 means last 5 exchanges = 10 messages (5 questions + 5 answers)
    k: 5
    
    # Maximum tokens in conversation history
    # Prevents context from exceeding model limits
    max_tokens: 2000
    
    # Whether to return messages as LangChain Message objects
    return_messages: true
    
    # Memory key for storing history
    memory_key: "chat_history"
  
  # Session management
  session:
    # Enable persistent memory across server restarts
    # If false, memory is in-process only (clears on restart)
    persistent: false
    
    # Database connection for persistent memory (if enabled)
    # Format: "sqlite:///data/database/chat_memory.db" or "postgresql://..."
    connection_string: "sqlite:///data/database/chat_memory.db"
    
    # Auto-cleanup old sessions (in hours)
    # 0 = disabled
    cleanup_after_hours: 24
  
  # Token counting
  token_counting:
    # Enable token counting for memory management
    enabled: true
    
    # Encoding to use for token counting
    # Options: "cl100k_base" (GPT-4), "p50k_base" (GPT-3), "r50k_base" (Codex)
    encoding: "cl100k_base"
    
    # Warn when approaching token limit (percentage)
    warning_threshold: 0.8  # Warn at 80% of max_tokens

# Embedding Configuration
embeddings:
  provider: "huggingface"  # openai, huggingface
  
  providers:
    openai:
      model: "text-embedding-3-small"
      api_key_env: "OPENAI_API_KEY"
      dimensions: 1536
      
    huggingface:
      model: "sentence-transformers/all-MiniLM-L6-v2"
      api_key_env: "HF_TOKEN"
      dimensions: 384

# Vector Database Configuration
vector_db:
  type: "chroma"  # chroma, faiss, pinecone
  persist_directory: "./chroma_db"
  collection_name: "BrainSightAIs_knowledge"
  
  # Search parameters
  search:
    k: 4  # Number of documents to retrieve
    score_threshold: 0.5  # Minimum relevance score
    search_type: "similarity"  # similarity, mmr, similarity_score_threshold
    
  # Chunking parameters
  chunking:
    chunk_size: 1000
    chunk_overlap: 200
    separators: ["\n\n", "\n", ". ", " ", ""]

# Document Processing
documents:
  # Supported file types
  supported_formats:
    - ".pdf"
    - ".docx"
    - ".txt"
    - ".md"
  
  # Maximum file size (bytes)
  max_file_size: 10485760  # 10MB
  
  # Data directory
  data_dir: "./data"
  upload_dir: "./uploads"

# API Configuration
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  
  # CORS settings
  cors:
    enabled: true
    allow_origins:
      - "https://portfolio-pingus.vercel.app"
      - "http://localhost:3000"
      - "http://127.0.0.1:3000"
    allow_credentials: true
    allow_methods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
    allow_headers: ["*"]
  
  # Rate limiting
  rate_limit:
    enabled: true
    requests_per_minute: 60
    requests_per_hour: 1000
  
  # Request timeout
  timeout: 60

# Caching Configuration
cache:
  enabled: true
  type: "memory"  # memory, redis
  ttl: 3600  # Cache TTL in seconds
  max_size: 1000  # Maximum cache entries

# Logging Configuration
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  
  # Log files
  file:
    enabled: true
    path: "./logs/app.log"
    max_bytes: 10485760  # 10MB
    backup_count: 5
  
  # Console logging
  console:
    enabled: true
    colorize: true

# Session Management
session:
  # Session timeout (seconds)
  timeout: 86400  # 24 hours
  
  # Cleanup interval (seconds)
  cleanup_interval: 3600  # 1 hour
  
  # Maximum sessions to keep
  max_sessions: 10000

# System Prompt
system_prompt: |
  You are VoxelBox Explore Assistant — the official technical support and research companion for BrainSightAI's VoxelBox Explore platform.

  Your Role
  - Help users with neuroimaging workflows, MRI/fMRI/diffusion analyses, and using the VoxelBox Explore platform.
  - Provide expert yet human, clear, and friendly explanations.
  - Always sound confident, natural, and approachable — never robotic or overly academic.

  Behavior & Output Rules
  1. You can answer questions about BrainSightAI, its features, services, and related product information.
  2. If the user asks how to contact BrainSightAI, where to get support, or any query outside your provided data or context, you must respond with:
   "You can reach BrainSightAI at support@brainsightai.com."
  3. Do not say "I don't have enough information" for such questions — instead, always guide them to the contact email above.
  4. For internal or confidential data not in your context, politely refer users to the same contact email.
  5. Maintain a polite and professional tone.
  6. Keep responses short and popup-friendly (ideally under 5 lines).
  7. Use natural, conversational language — no citations, brackets, or reference numbers (e.g., never show "[1]" or "(ref)").
  8. Summaries should be crisp and visually easy to scan.
  9. Start with a one-line insight or "Quick takeaway" when explaining results.
  10. Use short bullet points or numbered steps (max 4–6) for how-to questions.
  11. For conceptual or report-related questions, summarize key findings only — avoid long paragraphs.
  12. End with a friendly cue if more info is available (e.g., "Would you like a full summary?").

  Example responses:
  - User: "How do I contact BrainSightAI?"  
    Assistant: "You can reach BrainSightAI at support@brainsightai.com."
  
  - User: "Where can I get more info about BrainSightAI's services?"  
    Assistant: "You can reach BrainSightAI at support@brainsightai.com for detailed service information."

  Knowledge Scope
  - Structural MRI (T1, T2, FLAIR, T1CE)
  - Functional MRI (task-based, resting-state, preprocessing, stats)
  - Diffusion MRI & tractography (CSD, FA, MD, RD, deterministic/probabilistic)
  - Neuroinformatics, connectomics, QC, preprocessing workflows
  - VoxelBox platform tools: case management, upload, processing, visualization

  Context Use
  - Always ground responses in retrieved context if available.
  - If no relevant context is found, reply: "I don't have enough information from the data to answer that confidently."
  - Do not invent or assume technical details outside BrainSightAI's domain.

  Additional Rules
  - No citations, numbered references, or external paper links in answers.
  - Be concise, visually clean, and friendly.
  - Always maintain privacy and professionalism.
  - End any medically sensitive info with: "Not medical advice — consult your clinician."

# Monitoring & Analytics
monitoring:
  enabled: true
  
  # Track metrics
  track_usage: true
  track_costs: true
  track_performance: true
  
  # Alert thresholds
  alerts:
    error_rate_threshold: 0.05  # 5%
    response_time_threshold: 5000  # 5 seconds
    token_usage_threshold: 1000000  # 1M tokens per day